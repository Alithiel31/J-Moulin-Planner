services:
  postgres:
    image: postgres:16-alpine
    container_name: j-moulin-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: j_moulin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - j-moulin-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: j-moulin-backend
    env_file: ./backend/.env
    environment:
      # Override DATABASE_URL : en Docker le host est le nom du service, pas localhost
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/j_moulin
      NODE_ENV: production
      # Le navigateur accède au front via http://caesura:5173 (le Pi), pas localhost
      CORS_ORIGIN: http://caesura:5173
    ports:
      - '3005:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - j-moulin-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL est un build arg : Vite le bake dans le bundle JS à la compilation
        VITE_API_URL: http://caesura:3005/api
    container_name: j-moulin-frontend
    environment:
      NODE_ENV: production
      # ORIGIN indique à adapter-node l'URL publique du frontend
      ORIGIN: http://caesura:5173
    ports:
      - '5173:3000'
    depends_on:
      - backend
    networks:
      - j-moulin-network
    restart: unless-stopped

networks:
  j-moulin-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
