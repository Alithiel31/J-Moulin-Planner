services:
  postgres:
    image: postgres:16-alpine
    container_name: j-moulin-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-j_moulin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - j-moulin-network

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: j-moulin-backend-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-j_moulin}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - '${API_PORT:-3001}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend-api/uploads:/app/uploads
    networks:
      - j-moulin-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL must be a build arg: Vite bakes it into the JS bundle at compile time
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: j-moulin-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # ORIGIN tells adapter-node the public URL of the frontend (required for SSR/redirects)
      ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - '${FRONTEND_PORT:-5173}:3000'
    depends_on:
      - backend-api
    networks:
      - j-moulin-network
    restart: unless-stopped

networks:
  j-moulin-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
